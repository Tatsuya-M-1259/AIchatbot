<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Answer Analysis & Reviewer</title>
    
    <!-- アイコン設定 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 600;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .row-correct { border-left: 4px solid #22c55e; }
        .row-partial { border-left: 4px solid #eab308; }
        .row-incorrect { border-left: 4px solid #ef4444; }
        .row-unknown { border-left: 4px solid #94a3b8; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Header -->
    <header class="sticky top-0 z-40 w-full bg-white/80 border-b border-slate-200 backdrop-blur-md">
        <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-slate-900">回答正誤管理システム</h1>
                    <p id="loadStatus" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">NO DATA LOADED</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <label for="csvUpload" class="cursor-pointer bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    CSVインポート
                </label>
                <input type="file" id="csvUpload" class="hidden" accept=".csv">
                
                <button onclick="exportData()" class="bg-slate-900 hover:bg-slate-800 text-white px-3 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    出力
                </button>

                <div class="w-px h-6 bg-slate-200 mx-1"></div>

                <button onclick="clearStoredData()" class="text-slate-400 hover:text-rose-500 p-2 transition-colors" title="全データを削除">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6 space-y-6">

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="statsContainer">
            <div class="glass-card p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-medium text-slate-500">総案件数</span>
                    <i data-lucide="database" class="w-5 h-5 text-indigo-500"></i>
                </div>
                <div class="text-3xl font-bold" id="stat-total">0</div>
            </div>
            <div class="glass-card p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-medium text-slate-500">正解率</span>
                    <i data-lucide="trending-up" class="w-5 h-5 text-emerald-500"></i>
                </div>
                <div class="text-3xl font-bold text-emerald-600" id="stat-accuracy">0%</div>
            </div>
            <div class="glass-card p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-medium text-slate-500">未対応件数</span>
                    <i data-lucide="clock" class="w-5 h-5 text-amber-500"></i>
                </div>
                <div class="text-3xl font-bold text-amber-600" id="stat-pending">0</div>
            </div>
            <div class="glass-card p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-sm font-medium text-slate-500">エラー検知</span>
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-rose-500"></i>
                </div>
                <div class="text-3xl font-bold text-rose-600" id="stat-errors">0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Charts Section -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <i data-lucide="pie-chart" class="w-4 h-4"></i>判定内訳
                    </h2>
                    <div class="h-64 relative">
                        <canvas id="judgmentChart"></canvas>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h2 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i>エラー分類
                    </h2>
                    <div class="h-64 relative">
                        <canvas id="errorChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="lg:col-span-2 space-y-4">
                <div class="glass-card rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                    <div class="p-4 border-b border-slate-200 bg-slate-50/50 flex flex-wrap gap-3 items-center justify-between">
                        <div class="relative w-full md:w-80">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="案件ID、内容を検索..." class="w-full pl-10 pr-4 py-2 text-sm border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div class="flex gap-2">
                            <select id="filterJudge" class="text-sm border border-slate-200 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="all">すべての判定</option>
                                <option value="◎正解">◎ 正解</option>
                                <option value="〇一部正解">〇 一部正解</option>
                                <option value="✕不正解">✕ 不正解</option>
                                <option value="△判別不能">△ 判別不能</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto flex-grow max-h-[700px]">
                        <table class="w-full text-left text-sm border-collapse">
                            <thead class="sticky top-0 bg-white border-b border-slate-200 z-10 shadow-sm">
                                <tr>
                                    <th class="px-4 py-3 font-semibold text-slate-600">案件ID</th>
                                    <th class="px-4 py-3 font-semibold text-slate-600">判定</th>
                                    <th class="px-4 py-3 font-semibold text-slate-600">エラー分類</th>
                                    <th class="px-4 py-3 font-semibold text-slate-600">問い合わせ内容</th>
                                    <th class="px-4 py-3 font-semibold text-slate-600">対応状況</th>
                                    <th class="px-4 py-3 font-semibold text-slate-600 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTableBody" class="divide-y divide-slate-100">
                                <tr>
                                    <td colspan="6" class="px-4 py-12 text-center text-slate-400">
                                        <div class="flex flex-col items-center gap-2">
                                            <i data-lucide="file-text" class="w-8 h-8 opacity-20"></i>
                                            <p>CSVファイルをインポートしてください</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-5xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <div class="flex items-center gap-3">
                    <span id="modalCaseId" class="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded">CASE-XXXX</span>
                    <h3 class="text-xl font-bold text-slate-800">査読・詳細確認</h3>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-200 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-500"></i>
                </button>
            </div>
            
            <div class="p-8 overflow-y-auto grid grid-cols-1 lg:grid-cols-2 gap-8 scroll-hide">
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter block mb-2">ユーザーの問い合わせ内容</label>
                        <div id="modalQuery" class="p-4 bg-slate-50 border border-slate-100 rounded-xl text-slate-700 whitespace-pre-wrap leading-relaxed"></div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter block mb-2">AIの回答</label>
                        <div id="modalAnswer" class="p-4 bg-indigo-50 border border-indigo-100 rounded-xl text-slate-800 whitespace-pre-wrap leading-relaxed"></div>
                    </div>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-amber-500 uppercase tracking-tighter block mb-2">理想の回答 (正解案)</label>
                        <div id="modalIdeal" class="p-4 bg-amber-50 border border-amber-100 rounded-xl text-amber-900 whitespace-pre-wrap leading-relaxed"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter block mb-2">判定</label>
                            <div id="modalJudge" class="font-bold text-lg"></div>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter block mb-2">エラー分類</label>
                            <div id="modalError" class="font-bold text-slate-700"></div>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter block mb-2">改善アクション・メモ</label>
                        <textarea id="modalAction" class="w-full p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none h-32 text-slate-700" placeholder="改善が必要なポイントを入力..."></textarea>
                    </div>
                </div>
            </div>
            
            <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                <button onclick="closeModal()" class="px-6 py-2 rounded-xl border border-slate-200 text-slate-600 font-medium hover:bg-white transition-all">閉じる</button>
                <button onclick="saveChanges()" class="px-6 py-2 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition-all shadow-md shadow-indigo-200">変更を保存</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ai_analysis_dashboard_data_v2';
        let fullData = [];
        let filteredData = [];
        let charts = {};
        let currentEditingId = null;

        // アイコン初期化
        lucide.createIcons();

        // 確実なデータ読み込み関数
        function initializeApp() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        fullData = parsed;
                        filteredData = [...fullData];
                        refreshUI();
                        document.getElementById('loadStatus').textContent = `SAVED DATA LOADED: ${fullData.length} RECORDS`;
                        document.getElementById('loadStatus').classList.replace('text-slate-400', 'text-emerald-500');
                    }
                }
            } catch (e) {
                console.error("Storage load failed", e);
            }
        }

        // CSVアップロード
        document.getElementById('csvUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    processNewData(results.data);
                }
            });
        });

        function processNewData(data) {
            fullData = data.map((item, index) => ({
                id: item['案件ID'] || `ID-${Date.now()}-${index}`,
                session: item['セッションID'] || '',
                date: item['問い合わせ日時'] || '',
                userId: item['ユーザーID'] || '',
                query: item['問い合わせ内容'] || '',
                answer: item['回答内容'] || '',
                dept: item['所管課'] || '',
                judge: item['正誤判定'] || '△判別不能',
                errorType: item['エラー分類'] || 'なし',
                ideal: item['理想の回答'] || '',
                action: item['改善アクション'] || '',
                status: item['対応状況'] || '未着手',
                length: parseInt(item['文字数']) || 0
            }));

            saveToLocal();
            filteredData = [...fullData];
            refreshUI();
            
            document.getElementById('loadStatus').textContent = `NEW DATA IMPORTED: ${fullData.length} RECORDS`;
            document.getElementById('loadStatus').classList.replace('text-slate-400', 'text-indigo-500');
        }

        function refreshUI() {
            updateDashboard();
            renderTable();
            initCharts();
        }

        function saveToLocal() {
            try {
                const jsonStr = JSON.stringify(fullData);
                localStorage.setItem(STORAGE_KEY, jsonStr);
            } catch (e) {
                console.error("Storage save failed", e);
                if (e.name === 'QuotaExceededError') {
                    alert("ブラウザの保存容量がいっぱいです。不要なデータを削除するか、CSVを分割してください。");
                } else {
                    alert("データの保存に失敗しました。ブラウザの設定を確認してください。");
                }
            }
        }

        function clearStoredData() {
            if (confirm("現在保存されているすべてのデータを削除します。元には戻せませんが、よろしいですか？")) {
                localStorage.removeItem(STORAGE_KEY);
                fullData = [];
                filteredData = [];
                refreshUI();
                document.getElementById('loadStatus').textContent = "NO DATA LOADED";
                document.getElementById('loadStatus').className = "text-[10px] text-slate-400 font-bold uppercase tracking-widest";
                location.reload();
            }
        }

        function updateDashboard() {
            const total = fullData.length;
            const correct = fullData.filter(d => d.judge === '◎正解').length;
            const partial = fullData.filter(d => d.judge === '〇一部正解').length;
            const accuracy = total > 0 ? (((correct + (partial * 0.5)) / total) * 100).toFixed(1) : 0;
            const pending = fullData.filter(d => d.status === '未着手' || d.status === '対応中').length;
            const errors = fullData.filter(d => d.errorType && d.errorType !== 'なし').length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-accuracy').textContent = `${accuracy}%`;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-errors').textContent = errors;
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-slate-400">表示できるデータがありません</td></tr>`;
                return;
            }

            filteredData.forEach((row) => {
                const tr = document.createElement('tr');
                tr.className = `hover:bg-slate-50 transition-colors cursor-pointer border-l-4 ${getJudgeClass(row.judge)}`;
                tr.onclick = () => openReview(row.id);
                
                tr.innerHTML = `
                    <td class="px-4 py-4 font-mono text-xs text-slate-500">${row.id}</td>
                    <td class="px-4 py-4">
                        <span class="status-badge ${getBadgeColor(row.judge)}">${row.judge}</span>
                    </td>
                    <td class="px-4 py-4 text-xs font-medium text-slate-600">${row.errorType}</td>
                    <td class="px-4 py-4 max-w-xs truncate text-slate-600">${row.query}</td>
                    <td class="px-4 py-4">
                        <span class="text-xs px-2 py-1 rounded bg-slate-100 border border-slate-200">${row.status}</span>
                    </td>
                    <td class="px-4 py-4 text-right">
                        <button class="text-indigo-600 hover:text-indigo-800 font-bold">査読</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getJudgeClass(judge) {
            if (judge === '◎正解') return 'row-correct';
            if (judge === '〇一部正解') return 'row-partial';
            if (judge === '✕不正解') return 'row-incorrect';
            return 'row-unknown';
        }

        function getBadgeColor(judge) {
            if (judge === '◎正解') return 'bg-emerald-100 text-emerald-700';
            if (judge === '〇一部正解') return 'bg-amber-100 text-amber-700';
            if (judge === '✕不正解') return 'bg-rose-100 text-rose-700';
            return 'bg-slate-100 text-slate-700';
        }

        function initCharts() {
            const judgeCounts = {};
            fullData.forEach(d => judgeCounts[d.judge] = (judgeCounts[d.judge] || 0) + 1);

            const errorCounts = {};
            fullData.filter(d => d.errorType && d.errorType !== 'なし').forEach(d => errorCounts[d.errorType] = (errorCounts[d.errorType] || 0) + 1);

            if (charts.judgment) charts.judgment.destroy();
            if (charts.error) charts.error.destroy();

            const ctx1 = document.getElementById('judgmentChart');
            if (ctx1 && fullData.length > 0) {
                charts.judgment = new Chart(ctx1, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(judgeCounts),
                        datasets: [{
                            data: Object.values(judgeCounts),
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#94a3b8'],
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8 } } }
                    }
                });
            }

            const ctx2 = document.getElementById('errorChart');
            if (ctx2 && Object.keys(errorCounts).length > 0) {
                charts.error = new Chart(ctx2, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(errorCounts),
                        datasets: [{
                            label: '件数',
                            data: Object.values(errorCounts),
                            backgroundColor: '#6366f1',
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: { legend: { display: false } },
                        scales: { x: { grid: { display: false }, ticks: { stepSize: 1 } }, y: { grid: { display: false } } }
                    }
                });
            }
        }

        // 検索・フィルタリング
        const searchInput = document.getElementById('searchInput');
        const filterJudge = document.getElementById('filterJudge');

        [searchInput, filterJudge].forEach(el => {
            el.addEventListener('input', applyFilters);
        });

        function applyFilters() {
            const query = searchInput.value.toLowerCase();
            const judge = filterJudge.value;

            filteredData = fullData.filter(item => {
                const matchesSearch = item.id.toLowerCase().includes(query) || 
                                     item.query.toLowerCase().includes(query) || 
                                     item.answer.toLowerCase().includes(query);
                const matchesJudge = judge === 'all' || item.judge === judge;
                return matchesSearch && matchesJudge;
            });

            renderTable();
        }

        // モーダル
        function openReview(id) {
            const item = fullData.find(d => d.id === id);
            if(!item) return;

            currentEditingId = id;
            document.getElementById('modalCaseId').textContent = item.id;
            document.getElementById('modalQuery').textContent = item.query;
            document.getElementById('modalAnswer').textContent = item.answer;
            document.getElementById('modalIdeal').textContent = item.ideal || '（未登録）';
            document.getElementById('modalJudge').innerHTML = `<span class="status-badge ${getBadgeColor(item.judge)} text-base px-4 py-1">${item.judge}</span>`;
            document.getElementById('modalError').textContent = item.errorType;
            document.getElementById('modalAction').value = item.action;

            document.getElementById('reviewModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('reviewModal').classList.add('hidden');
        }

        function saveChanges() {
            if (!currentEditingId) return;
            
            const index = fullData.findIndex(d => d.id === currentEditingId);
            if (index !== -1) {
                fullData[index].action = document.getElementById('modalAction').value;
                saveToLocal();
                alert("変更を保存しました。");
            }
            
            closeModal();
            renderTable();
        }

        function exportData() {
            if (fullData.length === 0) return alert("出力するデータがありません");
            const csv = Papa.unparse(fullData);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `review_result_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 即時実行
        initializeApp();
    </script>
</body>
</html>
