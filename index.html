<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Answer Analysis & Reviewer (Local Edition)</title>
    
    <!-- アイコン・PWA設定 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- 外部ライブラリ (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f1f5f9;
        }

        /* 固定レイアウト設定 */
        .data-table { border-spacing: 0; width: 100%; table-layout: fixed; }
        .data-table th, .data-table td {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 10px 12px;
        }
        .data-table th { background-color: #f8fafc; position: sticky; top: 0; z-index: 10; font-weight: 800; color: #64748b; font-size: 11px; }

        .col-id { width: 130px; }
        .col-judge { width: 100px; }
        .col-error { width: 140px; }
        .col-dept { width: 200px; }
        .col-query { width: auto; min-width: 400px; }
        .col-action { width: 80px; }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            display: inline-block;
            text-align: center;
            width: 100%;
        }

        .row-correct { border-left: 5px solid #10b981 !important; }
        .row-partial { border-left: 5px solid #f59e0b !important; }
        .row-incorrect { border-left: 5px solid #ef4444 !important; }
        .row-unknown { border-left: 5px solid #94a3b8 !important; }
        
        .sortable-header { cursor: pointer; user-select: none; }
        .sortable-header:hover { background-color: #f1f5f9; }

        #uiMessage { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3); }
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s; }
        .drop-zone.active { border-color: #4f46e5; background-color: #f5f3ff; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <!-- Header -->
    <header class="sticky top-0 z-50 w-full bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-full mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-100">
                    <i data-lucide="layout" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-black text-lg leading-tight text-slate-900 tracking-tighter">AI正誤管理システム <span class="text-indigo-500 font-medium text-sm ml-2">Local Mode</span></h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <p id="loadStatus" class="text-[10px] text-slate-400 font-black uppercase tracking-widest leading-none text-emerald-600">READY</p>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="openNewRecordModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 shadow-md">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>新規登録
                </button>
                <label for="csvUpload" class="cursor-pointer bg-white border-2 border-slate-200 hover:border-indigo-400 text-slate-700 px-4 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4 text-indigo-500"></i>インポート
                </label>
                <input type="file" id="csvUpload" class="hidden" accept=".csv">
                <button onclick="exportData()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 shadow-md">
                    <i data-lucide="download" class="w-4 h-4 text-indigo-300"></i>CSV出力
                </button>
                <div class="w-px h-6 bg-slate-200 mx-2"></div>
                <button onclick="clearStoredData()" class="text-slate-400 hover:text-rose-600 p-2 transition-colors" title="全データ削除"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <!-- UI Overlay Messages -->
    <div id="uiMessage" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[300] min-w-[320px] px-8 py-5 rounded-3xl text-sm font-bold flex flex-col items-center gap-3 text-center transition-all"></div>

    <main class="p-6 space-y-6">
        <!-- KPI Section -->
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-3 grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Total</span>
                    <div class="text-3xl font-black text-slate-900" id="stat-total">0</div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Accuracy</span>
                    <div class="text-3xl font-black text-emerald-600" id="stat-accuracy">0%</div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Pending</span>
                    <div class="text-3xl font-black text-amber-500" id="stat-pending">0</div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Errors</span>
                    <div class="text-3xl font-black text-rose-500" id="stat-errors">0</div>
                </div>
            </div>
            <!-- Charts Section -->
            <!-- はみ出し防止のためコンテナの高さを拡大 (h-60 -> h-72) -->
            <div class="xl:col-span-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-72">
                <h2 class="text-xs font-black text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-tighter"><i data-lucide="pie-chart" class="w-4 h-4"></i>判定内訳</h2>
                <div class="flex-grow relative h-full w-full overflow-hidden">
                    <canvas id="judgmentChart"></canvas>
                </div>
            </div>
            <div class="xl:col-span-5 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-72">
                <h2 class="text-xs font-black text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-tighter"><i data-lucide="bar-chart-3" class="w-4 h-4"></i>主要エラー分類</h2>
                <div class="flex-grow relative h-full w-full overflow-hidden">
                    <canvas id="errorChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Table Area -->
        <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden flex flex-col min-h-[600px]">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="searchInput" placeholder="自由検索 (ID, 内容, 課名)..." class="pl-10 pr-4 py-2 text-sm border-2 border-slate-200 rounded-xl w-80 outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div class="h-6 w-px bg-slate-300"></div>
                    <select id="filterJudge" class="text-sm border-2 border-slate-200 rounded-xl px-3 py-2 bg-white outline-none focus:border-indigo-500 font-bold text-slate-600">
                        <option value="all">すべての判定</option>
                        <option value="◎正解">◎ 正解</option>
                        <option value="〇一部正解">〇 一部正解</option>
                        <option value="✕不正解">✕ 不正解</option>
                        <option value="△判別不能">△ 判別不能</option>
                    </select>
                    <select id="filterDept" class="text-sm border-2 border-slate-200 rounded-xl px-3 py-2 bg-white outline-none focus:border-indigo-500 font-bold text-slate-600 min-w-[180px]">
                        <option value="all">すべての所管課</option>
                    </select>
                </div>
                <div class="text-xs font-black text-slate-400 tracking-widest"><span id="recordCount" class="text-indigo-600 text-lg mr-1">0</span> RECORDS</div>
            </div>
            
            <!-- Grid -->
            <div class="overflow-auto flex-grow relative bg-slate-50/20">
                <table class="data-table hidden" id="mainDataTable">
                    <thead>
                        <tr>
                            <th class="col-id text-left sortable-header" onclick="toggleSort('id')">案件ID <i data-lucide="chevrons-up-down" class="w-3 h-3 inline ml-1"></i></th>
                            <th class="col-judge text-left">判定</th>
                            <th class="col-error text-left">エラー分類</th>
                            <th class="col-dept text-left sortable-header" onclick="toggleSort('dept1')">所管課 <i data-lucide="chevrons-up-down" class="w-3 h-3 inline ml-1"></i></th>
                            <th class="col-query text-left">内容</th>
                            <th class="col-action text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody"></tbody>
                </table>

                <!-- Initial Empty State -->
                <div id="emptyState" class="absolute inset-0 flex items-center justify-center p-10 cursor-pointer" onclick="document.getElementById('csvUpload').click()">
                    <div class="drop-zone p-16 rounded-[40px] w-full max-w-xl flex flex-col items-center gap-6 text-center shadow-inner">
                        <div class="bg-indigo-600 p-6 rounded-3xl text-white shadow-2xl shadow-indigo-200">
                            <i data-lucide="file-spreadsheet" class="w-12 h-12"></i>
                        </div>
                        <div>
                            <h3 class="font-black text-slate-800 text-2xl tracking-tighter">CSVをインポートして開始</h3>
                            <p class="text-slate-500 mt-2 font-medium">ここをクリックするか、CSVファイルをドロップしてください</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-6xl rounded-[32px] shadow-2xl overflow-hidden flex flex-col max-h-[92vh]">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-white">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-600 p-2 rounded-2xl text-white"><i data-lucide="edit-2" class="w-6 h-6"></i></div>
                    <div>
                        <h3 id="modalTitle" class="text-xl font-black text-slate-800">査読・案件編集</h3>
                        <p id="modalCaseIdDisplay" class="text-xs font-bold text-indigo-500 tracking-widest mt-0.5 uppercase">CASE-XXXX</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="p-3 hover:bg-slate-100 rounded-full transition-all"><i data-lucide="x" class="w-7 h-7 text-slate-400"></i></button>
            </div>
            <div class="p-8 overflow-y-auto grid grid-cols-1 lg:grid-cols-2 gap-8 bg-slate-50/50">
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-black text-slate-400 block mb-1.5 uppercase tracking-widest">案件ID</label><input type="text" id="edit-id" class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl text-sm font-mono shadow-sm"></div>
                        <div><label class="text-[10px] font-black text-slate-400 block mb-1.5 uppercase tracking-widest">日時</label><input type="text" id="edit-date" class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl text-sm shadow-sm"></div>
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 block mb-1.5 uppercase tracking-widest">内容</label><textarea id="edit-query" class="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl text-sm h-40 bg-white leading-relaxed shadow-sm"></textarea></div>
                    <div><label class="text-[10px] font-black text-indigo-500 block mb-1.5 uppercase tracking-widest">AI回答</label><textarea id="edit-answer" class="w-full px-5 py-4 border-2 border-indigo-100 bg-indigo-50/30 rounded-2xl text-sm h-56 leading-relaxed shadow-sm"></textarea></div>
                </div>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-2 underline decoration-indigo-300">正誤判定</label><select id="edit-judge" class="w-full px-2 py-2 border-2 border-slate-200 rounded-xl text-sm font-black bg-white"><option value="◎正解">◎ 正解</option><option value="〇一部正解">〇 一部正解</option><option value="✕不正解">✕ 不正解</option><option value="△判別不能">△ 判別不能</option></select></div>
                        <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-2">エラー分類</label><select id="edit-errorType" class="w-full px-2 py-2 border-2 border-slate-200 rounded-xl text-sm bg-white font-bold"><option value="なし">なし</option><option value="RAG欠如">RAG欠如</option><option value="ハルシネーション">ハルシネーション</option><option value="指示無視">指示無視</option><option value="文脈喪失">文脈喪失</option><option value="その他">その他</option></select></div>
                    </div>
                    <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-3">所管課（最大3枠）</label><div class="grid grid-cols-3 gap-3"><input type="text" id="edit-dept1" class="px-3 py-2 border-2 border-slate-200 rounded-xl text-xs" placeholder="課1"><input type="text" id="edit-dept2" class="px-3 py-2 border-2 border-slate-200 rounded-xl text-xs" placeholder="課2"><input type="text" id="edit-dept3" class="px-3 py-2 border-2 border-slate-200 rounded-xl text-xs" placeholder="課3"></div></div>
                    <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-2">Status</label><select id="edit-status" class="w-full px-2 py-2 border-2 border-slate-200 rounded-xl text-sm bg-white"><option value="未着手">未着手</option><option value="対応中">対応中</option><option value="完了">完了</option><option value="保留">保留</option></select></div>
                    <div><label class="text-[10px] font-black text-emerald-600 block mb-1.5 uppercase underline decoration-emerald-300">Ideal Answer</label><textarea id="edit-ideal" class="w-full px-5 py-4 border-2 border-emerald-100 bg-emerald-50/20 rounded-2xl text-sm h-36 leading-relaxed shadow-sm"></textarea></div>
                    <div><label class="text-[10px] font-black text-amber-600 block mb-1.5 uppercase underline decoration-amber-300">Analysis Note</label><textarea id="edit-action" class="w-full px-5 py-4 border-2 border-amber-100 bg-amber-50/20 rounded-2xl text-sm h-36 leading-relaxed shadow-sm"></textarea></div>
                </div>
            </div>
            <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-white">
                <button onclick="closeModal()" class="px-8 py-3 rounded-2xl border-2 border-slate-200 text-slate-600 font-black hover:bg-slate-50 transition-all text-sm">キャンセル</button>
                <button onclick="saveChanges()" class="px-12 py-3 rounded-2xl bg-indigo-600 text-white font-black hover:bg-indigo-700 shadow-2xl shadow-indigo-200 flex items-center gap-2 text-sm"><i data-lucide="save" class="w-4 h-4"></i>データを保存</button>
            </div>
        </div>
    </div>

    <!-- Script Section -->
    <script>
        const STORAGE_KEY = 'ai_answer_review_v_local_final';
        let fullData = [];
        let filteredData = [];
        let sortConfig = { key: 'id', direction: 'desc' };
        let charts = {};

        // 起動時初期化
        window.onload = () => {
            lucide.createIcons();
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    fullData = JSON.parse(saved);
                    updateDeptFilterList();
                    applyFilters();
                    showMessage("前回のデータを読み込みました");
                } catch(e) { console.error(e); }
            }
            refreshUI();
        };

        function showMessage(text, isError = false) {
            const el = document.getElementById('uiMessage');
            el.innerHTML = text;
            el.className = `fixed top-24 left-1/2 -translate-x-1/2 z-[300] min-w-[320px] px-8 py-5 rounded-3xl shadow-2xl text-sm font-bold flex flex-col items-center gap-3 text-center transition-all ${isError ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        // インポート処理
        document.getElementById('csvUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (fullData.length > 0 && !confirm("既存データを削除し、新しいCSVに置き換えますか？")) {
                e.target.value = ""; return;
            }

            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                transformHeader: (h) => h.trim().replace(/^\uFEFF/, ''),
                complete: (results) => {
                    const newData = results.data.map((item, index) => {
                        const get = (options) => {
                            for(let opt of options) if (item[opt] !== undefined) return item[opt];
                            return '';
                        };
                        const rawDepts = (get(['所管課', 'dept']) || '').split(/[\n,]/);
                        return {
                            id: (get(['案件ID', 'id']) || `CASE-${Date.now()}-${index}`).toString().trim(),
                            session: get(['セッションID', 'session']),
                            date: get(['問い合わせ日時', 'date']),
                            userId: get(['ユーザーID', 'userId']),
                            query: get(['問い合わせ内容', 'query']),
                            answer: get(['回答内容', 'answer']),
                            dept1: rawDepts[0]?.trim() || '',
                            dept2: rawDepts[1]?.trim() || '',
                            dept3: rawDepts[2]?.trim() || '',
                            judge: get(['正誤判定', 'judge']) || '△判別不能',
                            errorType: get(['エラー分類', 'errorType']) || 'なし',
                            ideal: get(['理想の回答', 'ideal']),
                            action: get(['改善アクション', 'action']),
                            status: get(['対応状況', 'status']) || '未着手'
                        };
                    });
                    fullData = newData;
                    saveToLocal();
                    updateDeptFilterList();
                    applyFilters();
                    showMessage(`${newData.length} 件のインポートが完了しました`);
                }
            });
            e.target.value = "";
        });

        // 共通ロジック
        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const j = document.getElementById('filterJudge').value;
            const d = document.getElementById('filterDept').value;

            filteredData = fullData.filter(item => {
                const deptsAll = `${item.dept1} ${item.dept2} ${item.dept3}`.toLowerCase();
                const matchSearch = item.id.toLowerCase().includes(q) || 
                                   item.query.toLowerCase().includes(q) || 
                                   item.answer.toLowerCase().includes(q) || 
                                   deptsAll.includes(q);
                const matchJudge = (j === 'all' || item.judge === j);
                const matchDept = (d === 'all' || item.dept1 === d || item.dept2 === d || item.dept3 === d);
                return matchSearch && matchJudge && matchDept;
            });

            if (sortConfig.key) {
                filteredData.sort((a, b) => {
                    const vA = (a[sortConfig.key] || '').toString();
                    const vB = (b[sortConfig.key] || '').toString();
                    return sortConfig.direction === 'asc' ? vA.localeCompare(vB, undefined, {numeric: true}) : vB.localeCompare(vA, undefined, {numeric: true});
                });
            }
            refreshUI();
        }

        function refreshUI() {
            updateDashboard();
            renderTable();
            initCharts();
            lucide.createIcons();
            document.getElementById('mainDataTable').classList.toggle('hidden', fullData.length === 0);
            document.getElementById('emptyState').classList.toggle('hidden', fullData.length > 0);
            document.getElementById('recordCount').textContent = filteredData.length;
        }

        function updateDashboard() {
            const total = fullData.length;
            const correct = fullData.filter(d => d.judge === '◎正解').length;
            const partial = fullData.filter(d => d.judge === '〇一部正解').length;
            const accuracy = total > 0 ? (((correct + (partial * 0.5)) / total) * 100).toFixed(1) : 0;
            const pending = fullData.filter(d => d.status === '未着手' || d.status === '対応中').length;
            const errors = fullData.filter(d => d.errorType && d.errorType !== 'なし').length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-accuracy').textContent = `${accuracy}%`;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-errors').textContent = errors;
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            filteredData.forEach((row) => {
                const tr = document.createElement('tr');
                tr.className = `hover:bg-indigo-50 cursor-pointer text-[12px] border-l-4 transition-all ${getJudgeClass(row.judge)}`;
                tr.onclick = () => openReview(row.id);
                const depts = [row.dept1, row.dept2, row.dept3].filter(Boolean).join(', ');
                tr.innerHTML = `
                    <td class="col-id font-mono text-slate-500 font-bold">${row.id}</td>
                    <td class="col-judge"><span class="status-badge ${getBadgeColor(row.judge)}">${row.judge}</span></td>
                    <td class="col-error text-slate-600 font-bold">${row.errorType}</td>
                    <td class="col-dept text-slate-500 italic">${depts || '-'}</td>
                    <td class="col-query text-slate-800 font-bold">${row.query}</td>
                    <td class="col-action text-center"><button class="bg-slate-100 hover:bg-indigo-600 hover:text-white px-2 py-1 rounded font-black transition-all">EDIT</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getJudgeClass(j) { return j==='◎正解' ? 'row-correct' : j==='〇一部正解' ? 'row-partial' : j==='✕不正解' ? 'row-incorrect' : 'row-unknown'; }
        function getBadgeColor(j) { return j==='◎正解' ? 'bg-emerald-100 text-emerald-700' : j==='〇一部正解' ? 'bg-amber-100 text-amber-700' : j==='✕不正解' ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-500'; }

        // --- グラフ表示修正箇所 (高さを活かし、はみ出しを防止) ---
        function initCharts() {
            const judgeCounts = {}; fullData.forEach(d => judgeCounts[d.judge] = (judgeCounts[d.judge] || 0) + 1);
            const errorCounts = {}; fullData.filter(d => d.errorType && d.errorType !== 'なし').forEach(d => errorCounts[d.errorType] = (errorCounts[d.errorType] || 0) + 1);
            
            if (charts.judgment) charts.judgment.destroy();
            if (charts.error) charts.error.destroy();
            
            const ctx1 = document.getElementById('judgmentChart');
            if (ctx1 && fullData.length > 0) {
                charts.judgment = new Chart(ctx1, { 
                    type: 'doughnut', 
                    data: { 
                        labels: Object.keys(judgeCounts), 
                        datasets: [{ data: Object.values(judgeCounts), backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#94a3b8'], borderWidth: 0 }] 
                    }, 
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        layout: {
                            padding: { top: 10, bottom: 10, left: 10, right: 10 }
                        },
                        plugins: { 
                            legend: { 
                                position: 'bottom', // 下側に配置
                                labels: { 
                                    usePointStyle: true, 
                                    boxWidth: 8, 
                                    font: { size: 10, weight: 'bold' },
                                    padding: 15
                                } 
                            },
                            tooltip: { enabled: true }
                        } 
                    } 
                });
            }
            const ctx2 = document.getElementById('errorChart');
            if (ctx2 && Object.keys(errorCounts).length > 0) {
                charts.error = new Chart(ctx2, { 
                    type: 'bar', 
                    data: { 
                        labels: Object.keys(errorCounts), 
                        datasets: [{ label: '件数', data: Object.values(errorCounts), backgroundColor: '#6366f1', borderRadius: 4 }] 
                    }, 
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        indexAxis: 'y', 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            x: { grid: { display: false }, ticks: { font: { size: 9 } } }, 
                            y: { grid: { display: false }, ticks: { font: { size: 10, weight: 'bold' } } } 
                        } 
                    } 
                });
            }
        }

        // Global Actions
        window.openNewRecordModal = () => {
            currentEditingId = null;
            document.getElementById('modalTitle').textContent = "新規案件登録";
            document.getElementById('modalCaseIdDisplay').textContent = "NEW ENTRY";
            ['edit-id', 'edit-session', 'edit-userId', 'edit-query', 'edit-answer', 'edit-dept1', 'edit-dept2', 'edit-dept3', 'edit-ideal', 'edit-action'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('edit-id').value = `CASE-${Date.now().toString().slice(-6)}`;
            document.getElementById('edit-date').value = new Date().toLocaleString('ja-JP');
            document.getElementById('edit-judge').value = "△判別不能";
            document.getElementById('edit-errorType').value = "なし";
            document.getElementById('edit-status').value = "未着手";
            document.getElementById('reviewModal').classList.remove('hidden');
        };

        window.openReview = (id) => {
            const item = fullData.find(d => d.id === id); if(!item) return;
            currentEditingId = id;
            document.getElementById('modalTitle').textContent = "査読・データ編集";
            document.getElementById('modalCaseIdDisplay').textContent = item.id;
            ['id', 'session', 'date', 'userId', 'query', 'answer', 'dept1', 'dept2', 'dept3', 'judge', 'errorType', 'status', 'ideal', 'action'].forEach(k => {
                const el = document.getElementById(`edit-${k}`); if (el) el.value = item[k] || '';
            });
            document.getElementById('reviewModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('reviewModal').classList.add('hidden');

        window.saveChanges = () => {
            const id = document.getElementById('edit-id').value.trim();
            if (!id) return alert("IDは必須です");
            const record = { id };
            ['date', 'session', 'userId', 'query', 'answer', 'judge', 'errorType', 'dept1', 'dept2', 'dept3', 'status', 'ideal', 'action'].forEach(k => {
                record[k] = document.getElementById(`edit-${k}`).value;
            });
            if (currentEditingId === null) fullData.unshift(record);
            else { const idx = fullData.findIndex(d => d.id === currentEditingId); if(idx !== -1) fullData[idx] = record; }
            saveToLocal(); updateDeptFilterList(); applyFilters(); closeModal(); showMessage("保存しました");
        };

        function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(fullData)); }

        window.clearStoredData = () => {
            if (!confirm("全てのデータを消去します。本当によろしいですか？")) return;
            localStorage.removeItem(STORAGE_KEY); fullData = []; applyFilters(); showMessage("全消去しました");
        };

        window.exportData = () => {
            if (fullData.length === 0) return alert("データがありません");
            const exp = fullData.map(d => ({
                "案件ID": d.id, "セッションID": d.session, "問い合わせ日時": d.date, "ユーザーID": d.userId, "問い合わせ内容": d.query, "回答内容": d.answer, "所管課": [d.dept1, d.dept2, d.dept3].filter(Boolean).join('\n'), "正誤判定": d.judge, "エラー分類": d.errorType, "理想の回答": d.ideal, "改善アクション": d.action, "対応状況": d.status
            }));
            const csv = Papa.unparse(exp);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `AI分析結果_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.toggleSort = (key) => {
            sortConfig.direction = (sortConfig.key === key && sortConfig.direction === 'asc') ? 'desc' : 'asc';
            sortConfig.key = key;
            applyFilters();
        };

        function updateDeptFilterList() {
            const depts = new Set();
            fullData.forEach(d => { [d.dept1, d.dept2, d.dept3].forEach(v => v && depts.add(v)); });
            const sel = document.getElementById('filterDept');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">すべての所管課</option>';
            Array.from(depts).sort().forEach(d => { const o = document.createElement('option'); o.value = o.textContent = d; sel.appendChild(o); });
            if (depts.has(cur)) sel.value = cur;
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterJudge').addEventListener('change', applyFilters);
        document.getElementById('filterDept').addEventListener('change', applyFilters);
    </script>
</body>
</html>
