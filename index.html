<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Answer Analysis - Enterprise Sync</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f1f5f9;
        }

        /* 固定レイアウト */
        .data-table { border-spacing: 0; width: 100%; table-layout: fixed; }
        .data-table th, .data-table td {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 10px 12px;
        }
        .data-table th { background-color: #f8fafc; position: sticky; top: 0; z-index: 10; font-weight: 900; color: #64748b; }

        .col-id { width: 130px; }
        .col-judge { width: 100px; }
        .col-error { width: 140px; }
        .col-dept { width: 200px; }
        .col-query { width: auto; min-width: 400px; }
        .col-action { width: 80px; }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            display: inline-block;
            text-align: center;
            width: 100%;
        }

        .row-correct { border-left: 5px solid #10b981 !important; }
        .row-partial { border-left: 5px solid #f59e0b !important; }
        .row-incorrect { border-left: 5px solid #ef4444 !important; }
        .row-unknown { border-left: 5px solid #94a3b8 !important; }
        
        .sortable-header { cursor: pointer; user-select: none; }
        .sortable-header:hover { background-color: #f1f5f9; }

        #uiMessage {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.2s; }
        .drop-zone.active { border-color: #4f46e5; background-color: #f5f3ff; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen text-slate-800 pb-12">

    <!-- Header -->
    <header class="sticky top-0 z-50 w-full bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-full mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                    <i data-lucide="database" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-black text-lg leading-tight text-slate-900 tracking-tighter">AI正誤管理・査読システム</h1>
                    <div class="flex items-center gap-2 mt-0.5">
                        <div id="syncIndicator" class="w-2 h-2 rounded-full bg-slate-300"></div>
                        <p id="loadStatus" class="text-[10px] text-slate-400 font-black uppercase tracking-widest">CONNECTING...</p>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="openNewRecordModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 shadow-md">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>新規登録
                </button>
                <label for="csvUpload" class="cursor-pointer bg-white border-2 border-slate-200 hover:border-indigo-400 text-slate-700 px-4 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4 text-indigo-500"></i>インポート
                </label>
                <input type="file" id="csvUpload" class="hidden" accept=".csv">
                <button onclick="exportData()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-black transition-all flex items-center gap-2 shadow-md">
                    <i data-lucide="download" class="w-4 h-4 text-indigo-300"></i>CSV出力
                </button>
                <div class="w-px h-6 bg-slate-200 mx-2"></div>
                <button onclick="clearCloudData()" class="text-slate-400 hover:text-rose-600 p-2 transition-colors" title="全データ削除"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <!-- UI Overlay for Progress/Messages -->
    <div id="uiMessage" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[300] min-w-[320px] px-8 py-5 rounded-3xl text-sm font-bold flex flex-col items-center gap-3 text-center"></div>

    <main class="p-6 space-y-6">
        <!-- KPI Dashboard -->
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">
            <div class="xl:col-span-3 grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Total</span>
                    <div class="text-3xl font-black text-slate-900" id="stat-total">0</div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Accuracy</span>
                    <div class="text-3xl font-black text-emerald-600" id="stat-accuracy">0%</div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Pending</span>
                    <div class="text-3xl font-black text-amber-500" id="stat-pending">0</div>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Errors</span>
                    <div class="text-3xl font-black text-rose-500" id="stat-errors">0</div>
                </div>
            </div>
            <!-- Charts -->
            <div class="xl:col-span-4 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-48">
                <h2 class="text-xs font-black text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-tighter"><i data-lucide="pie-chart" class="w-4 h-4"></i>判定内訳</h2>
                <div class="flex-grow relative"><canvas id="judgmentChart"></canvas></div>
            </div>
            <div class="xl:col-span-5 bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col h-48">
                <h2 class="text-xs font-black text-slate-500 mb-2 flex items-center gap-2 uppercase tracking-tighter"><i data-lucide="bar-chart-3" class="w-4 h-4"></i>主要エラー分類</h2>
                <div class="flex-grow relative"><canvas id="errorChart"></canvas></div>
            </div>
        </div>

        <!-- Main Data Area -->
        <div class="bg-white rounded-3xl border border-slate-200 shadow-xl overflow-hidden flex flex-col min-h-[600px]">
            <!-- Filters -->
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="searchInput" placeholder="クラウド横断検索 (ID, 内容, 課名)..." class="pl-10 pr-4 py-2 text-sm border-2 border-slate-200 rounded-xl w-80 outline-none focus:border-indigo-500 transition-all">
                    </div>
                    <div class="h-6 w-px bg-slate-300"></div>
                    <select id="filterJudge" class="text-sm border-2 border-slate-200 rounded-xl px-3 py-2 bg-white outline-none focus:border-indigo-500 font-bold text-slate-600">
                        <option value="all">すべての判定</option>
                        <option value="◎正解">◎ 正解</option>
                        <option value="〇一部正解">〇 一部正解</option>
                        <option value="✕不正解">✕ 不正解</option>
                        <option value="△判別不能">△ 判別不能</option>
                    </select>
                    <select id="filterDept" class="text-sm border-2 border-slate-200 rounded-xl px-3 py-2 bg-white outline-none focus:border-indigo-500 font-bold text-slate-600 min-w-[180px]">
                        <option value="all">すべての所管課</option>
                    </select>
                </div>
                <div class="text-xs font-black text-slate-400 tracking-widest"><span id="recordCount" class="text-indigo-600 text-lg mr-1">0</span> RECORDS TOTAL</div>
            </div>
            
            <!-- Table Container -->
            <div class="overflow-auto flex-grow relative bg-slate-50/20">
                <table class="data-table hidden" id="mainDataTable">
                    <thead>
                        <tr>
                            <th class="col-id text-left sortable-header" onclick="toggleSort('id')">案件ID <i data-lucide="chevrons-up-down" class="w-3 h-3 inline ml-1"></i></th>
                            <th class="col-judge text-left">判定</th>
                            <th class="col-error text-left">エラー分類</th>
                            <th class="col-dept text-left sortable-header" onclick="toggleSort('dept1')">所管課 <i data-lucide="chevrons-up-down" class="w-3 h-3 inline ml-1"></i></th>
                            <th class="col-query text-left">問い合わせ内容</th>
                            <th class="col-action text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody"></tbody>
                </table>

                <!-- Initial Empty State -->
                <div id="emptyState" class="absolute inset-0 flex items-center justify-center p-10 cursor-pointer" onclick="document.getElementById('csvUpload').click()">
                    <div class="drop-zone p-16 rounded-[40px] w-full max-w-xl flex flex-col items-center gap-6 text-center shadow-inner">
                        <div class="bg-indigo-600 p-6 rounded-3xl text-white shadow-2xl shadow-indigo-200">
                            <i data-lucide="cloud-upload" class="w-12 h-12"></i>
                        </div>
                        <div>
                            <h3 class="font-black text-slate-800 text-2xl tracking-tighter">CSVをインポートして共有を開始</h3>
                            <p class="text-slate-500 mt-2 font-medium">ここをクリックするか、CSVファイルをドロップしてください</p>
                        </div>
                        <div class="flex gap-3">
                            <span class="px-4 py-1.5 bg-white border border-slate-200 text-[10px] font-black rounded-full text-slate-400">リアルタイム同期</span>
                            <span class="px-4 py-1.5 bg-white border border-slate-200 text-[10px] font-black rounded-full text-slate-400">500件以上対応</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- User ID Footer -->
    <footer class="fixed bottom-0 left-0 w-full bg-slate-900 text-white py-1 px-4 flex justify-between items-center z-[150]">
        <div class="text-[8px] font-black uppercase tracking-[0.2em] text-slate-500">Cloud Sync Active - Amakusa AI Project</div>
        <div id="userIdDisplay" class="text-[8px] font-mono text-slate-400 uppercase">AUTHENTICATING...</div>
    </footer>

    <!-- Review Modal -->
    <div id="reviewModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-6xl rounded-[32px] shadow-2xl overflow-hidden flex flex-col max-h-[92vh]">
            <!-- Header -->
            <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-white">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-600 p-2 rounded-2xl text-white"><i data-lucide="edit-2" class="w-6 h-6"></i></div>
                    <div>
                        <h3 id="modalTitle" class="text-xl font-black text-slate-800">査読・案件編集</h3>
                        <p id="modalCaseIdDisplay" class="text-xs font-bold text-indigo-500 tracking-widest mt-0.5">CASE-0000</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="p-3 hover:bg-slate-100 rounded-full transition-all"><i data-lucide="x" class="w-7 h-7 text-slate-400"></i></button>
            </div>
            <!-- Scrollable Content -->
            <div class="p-8 overflow-y-auto grid grid-cols-1 lg:grid-cols-2 gap-8 bg-slate-50/50">
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1.5">案件ID</label><input type="text" id="edit-id" class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl text-sm bg-white font-mono shadow-sm"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1.5">日時</label><input type="text" id="edit-date" class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl text-sm bg-white shadow-sm"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1.5">セッションID</label><input type="text" id="edit-session" class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl text-sm bg-white shadow-sm"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1.5">ユーザーID</label><input type="text" id="edit-userId" class="w-full px-4 py-2.5 border-2 border-slate-200 rounded-xl text-sm bg-white shadow-sm"></div>
                    </div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase block mb-1.5">問い合わせ内容</label><textarea id="edit-query" class="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl text-sm h-40 bg-white leading-relaxed shadow-sm"></textarea></div>
                    <div><label class="text-[10px] font-black text-indigo-500 uppercase block mb-1.5">AIの回答内容</label><textarea id="edit-answer" class="w-full px-5 py-4 border-2 border-indigo-100 bg-indigo-50/30 rounded-2xl text-sm h-56 bg-white leading-relaxed shadow-sm"></textarea></div>
                </div>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-2 underline decoration-indigo-300 uppercase tracking-widest">Judgment</label><select id="edit-judge" class="w-full px-2 py-2 border-2 border-slate-200 rounded-xl text-sm font-black bg-white focus:border-indigo-400 outline-none"><option value="◎正解">◎ 正解</option><option value="〇一部正解">〇 一部正解</option><option value="✕不正解">✕ 不正解</option><option value="△判別不能">△ 判別不能</option></select></div>
                        <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">Error Type</label><select id="edit-errorType" class="w-full px-2 py-2 border-2 border-slate-200 rounded-xl text-sm bg-white font-bold"><option value="なし">なし</option><option value="RAG欠如">RAG欠如</option><option value="ハルシネーション">ハルシネーション</option><option value="指示無視">指示無視</option><option value="文脈喪失">文脈喪失</option><option value="その他">その他</option></select></div>
                    </div>
                    <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-3 uppercase tracking-widest">所管課（最大3枠）</label><div class="grid grid-cols-3 gap-3"><input type="text" id="edit-dept1" class="px-3 py-2 border-2 border-slate-200 rounded-xl text-xs" placeholder="課1"><input type="text" id="edit-dept2" class="px-3 py-2 border-2 border-slate-200 rounded-xl text-xs" placeholder="課2"><input type="text" id="edit-dept3" class="px-3 py-2 border-2 border-slate-200 rounded-xl text-xs" placeholder="課3"></div></div>
                    <div class="p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><label class="text-[10px] font-black text-slate-400 block mb-2 uppercase tracking-widest">Status</label><select id="edit-status" class="w-full px-2 py-2 border-2 border-slate-200 rounded-xl text-sm bg-white"><option value="未着手">未着手</option><option value="対応中">対応中</option><option value="完了">完了</option><option value="保留">保留</option></select></div>
                    <div><label class="text-[10px] font-black text-emerald-600 block mb-1.5 uppercase tracking-widest underline decoration-emerald-300">Ideal Answer</label><textarea id="edit-ideal" class="w-full px-5 py-4 border-2 border-emerald-100 bg-emerald-50/20 rounded-2xl text-sm h-36 leading-relaxed shadow-sm"></textarea></div>
                    <div><label class="text-[10px] font-black text-amber-600 block mb-1.5 uppercase tracking-widest underline decoration-amber-300">Analysis Note</label><textarea id="edit-action" class="w-full px-5 py-4 border-2 border-amber-100 bg-amber-50/20 rounded-2xl text-sm h-36 leading-relaxed shadow-sm"></textarea></div>
                </div>
            </div>
            <!-- Footer -->
            <div class="p-6 border-t border-slate-100 flex justify-end gap-3 bg-white">
                <button onclick="closeModal()" class="px-8 py-3 rounded-2xl border-2 border-slate-200 text-slate-600 font-black hover:bg-slate-50 transition-all text-sm">キャンセル</button>
                <button onclick="saveChanges()" id="saveBtn" class="px-12 py-3 rounded-2xl bg-indigo-600 text-white font-black hover:bg-indigo-700 shadow-2xl shadow-indigo-200 flex items-center gap-2 text-sm"><i data-lucide="save" class="w-4 h-4"></i>クラウドに保存</button>
            </div>
        </div>
    </div>

    <!-- Script Section -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, getDocs, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'amakusa-ai-review-vfinal';

        // Globals
        window.fullData = [];
        window.filteredData = [];
        window.sortConfig = { key: 'id', direction: 'desc' };
        window.charts = {};
        window.currentEditingId = null;

        // UI Utils
        function showMessage(text, isError = false, persist = false) {
            const el = document.getElementById('uiMessage');
            el.innerHTML = text;
            el.className = `fixed top-24 left-1/2 -translate-x-1/2 z-[300] min-w-[320px] px-8 py-5 rounded-3xl shadow-2xl text-sm font-bold flex flex-col items-center gap-3 text-center transition-all ${isError ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'}`;
            el.classList.remove('hidden');
            if (!persist) setTimeout(() => el.classList.add('hidden'), 6000);
        }

        const initCloud = async () => {
            updateLoadStatus("AUTH CONNECTING...", "text-amber-500");
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error", err);
                updateLoadStatus("OFFLINE MODE", "text-rose-500");
                return;
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('userIdDisplay').textContent = `USER: ${user.uid.slice(0, 12)}...`;
                    setupRealtimeSync();
                }
            });
        };

        const setupRealtimeSync = () => {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'answers');
            onSnapshot(colRef, (snapshot) => {
                window.fullData = snapshot.docs.map(doc => doc.data());
                updateDeptFilterList();
                applyFilters();
                updateLoadStatus(`CLOUD SYNCED: ${window.fullData.length}`, 'text-emerald-500 font-black');
                document.getElementById('syncIndicator').className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse";
            }, (err) => {
                console.error("Sync Error", err);
                updateLoadStatus("CLOUD ERROR", "text-rose-500");
                document.getElementById('syncIndicator').className = "w-2 h-2 rounded-full bg-rose-600";
            });
        };

        // インポートロジック (超強化版)
        document.getElementById('csvUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!auth.currentUser) {
                showMessage("<i data-lucide='alert-circle'></i> 認証が完了していません。再読み込みしてください。", true);
                return;
            }

            if (!confirm("既存データを削除し、新しいCSVに置き換えますか？\n(注意: 全ユーザーのデータが書き換わります)")) {
                e.target.value = ""; return;
            }

            showMessage("<i data-lucide='loader' class='animate-spin'></i> ファイルを解析しています...", false, true);
            lucide.createIcons();
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    try {
                        const newData = results.data
                            .filter(row => Object.values(row).some(v => v)) // 空行除外
                            .map((item, index) => {
                                // ヘッダー正規化関数
                                const get = (options) => {
                                    for(let opt of options) {
                                        const foundKey = Object.keys(item).find(k => k.trim().replace(/^\uFEFF/, '') === opt);
                                        if (foundKey) return item[foundKey];
                                    }
                                    return '';
                                };

                                const rawDepts = (get(['所管課', 'dept', 'department']) || '').split(/[\n,]/);
                                const rawId = get(['案件ID', 'id']);
                                const recordId = rawId ? rawId.toString().trim() : `CASE-${Date.now()}-${index}`;

                                return {
                                    id: recordId,
                                    session: get(['セッションID', 'session']) || '',
                                    date: get(['問い合わせ日時', 'date']) || '',
                                    userId: get(['ユーザーID', 'userId']) || '',
                                    query: get(['問い合わせ内容', 'query']) || '',
                                    answer: get(['回答内容', 'answer']) || '',
                                    dept1: rawDepts[0]?.trim() || '',
                                    dept2: rawDepts[1]?.trim() || '',
                                    dept3: rawDepts[2]?.trim() || '',
                                    judge: get(['正誤判定', 'judge']) || '△判別不能',
                                    errorType: get(['エラー分類', 'errorType']) || 'なし',
                                    ideal: get(['理想の回答', 'ideal']) || '',
                                    action: get(['改善アクション', 'action']) || '',
                                    status: get(['対応状況', 'status']) || '未着手'
                                };
                            });

                        if (newData.length === 0) {
                            showMessage("有効なデータが見つかりませんでした。", true);
                            return;
                        }

                        // 既存データの削除
                        showMessage("<i data-lucide='loader' class='animate-spin'></i> クラウド上の旧データを削除中...", false, true);
                        lucide.createIcons();
                        const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'answers');
                        const snapshot = await getDocs(colRef);
                        const docsToDelete = snapshot.docs;

                        for (let i = 0; i < docsToDelete.length; i += 500) {
                            const batch = writeBatch(db);
                            docsToDelete.slice(i, i + 500).forEach(d => batch.delete(d.ref));
                            await batch.commit();
                        }

                        // 新規データの書き込み
                        for (let i = 0; i < newData.length; i += 500) {
                            showMessage(`<i data-lucide='loader' class='animate-spin'></i> 書き込み中... (${Math.min(i+500, newData.length)} / ${newData.length}件)`, false, true);
                            lucide.createIcons();
                            const batch = writeBatch(db);
                            const chunk = newData.slice(i, i + 500);
                            chunk.forEach(record => {
                                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'answers', record.id), record);
                            });
                            await batch.commit();
                        }

                        showMessage("<i data-lucide='check-circle'></i> インポートが正常に完了しました！");
                    } catch (err) {
                        console.error(err);
                        showMessage(`インポート失敗: ${err.message}`, true);
                    } finally {
                        e.target.value = "";
                        lucide.createIcons();
                    }
                }
            });
        });

        // 共通ロジック
        function applyFilters() {
            const queryText = document.getElementById('searchInput').value.toLowerCase();
            const judge = document.getElementById('filterJudge').value;
            const deptFilter = document.getElementById('filterDept').value;

            window.filteredData = window.fullData.filter(item => {
                const deptsAll = `${item.dept1} ${item.dept2} ${item.dept3}`.toLowerCase();
                const matchSearch = item.id.toLowerCase().includes(queryText) || 
                                   item.query.toLowerCase().includes(queryText) || 
                                   item.answer.toLowerCase().includes(queryText) || 
                                   deptsAll.includes(queryText);
                const matchJudge = (judge === 'all' || item.judge === judge);
                const matchDept = (deptFilter === 'all' || item.dept1 === deptFilter || item.dept2 === deptFilter || item.dept3 === deptFilter);
                return matchSearch && matchJudge && matchDept;
            });

            if (window.sortConfig.key) {
                window.filteredData.sort((a, b) => {
                    const vA = (a[window.sortConfig.key] || '').toString();
                    const vB = (b[window.sortConfig.key] || '').toString();
                    return window.sortConfig.direction === 'asc' 
                        ? vA.localeCompare(vB, undefined, {numeric: true}) 
                        : vB.localeCompare(vA, undefined, {numeric: true});
                });
            }
            refreshUI();
        }

        function refreshUI() {
            updateDashboard();
            renderTable();
            initCharts();
            lucide.createIcons();
            const table = document.getElementById('mainDataTable');
            const empty = document.getElementById('emptyState');
            if (window.fullData.length > 0) { table.classList.remove('hidden'); empty.classList.add('hidden'); }
            else { table.classList.add('hidden'); empty.classList.remove('hidden'); }
            document.getElementById('recordCount').textContent = window.filteredData.length;
        }

        function updateDashboard() {
            const total = window.fullData.length;
            const correct = window.fullData.filter(d => d.judge === '◎正解').length;
            const partial = window.fullData.filter(d => d.judge === '〇一部正解').length;
            const accuracy = total > 0 ? (((correct + (partial * 0.5)) / total) * 100).toFixed(1) : 0;
            const pending = window.fullData.filter(d => d.status === '未着手' || d.status === '対応中').length;
            const errors = window.fullData.filter(d => d.errorType && d.errorType !== 'なし').length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-accuracy').textContent = `${accuracy}%`;
            document.getElementById('stat-pending').textContent = pending;
            document.getElementById('stat-errors').textContent = errors;
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            window.filteredData.forEach((row) => {
                const tr = document.createElement('tr');
                tr.className = `hover:bg-indigo-50 cursor-pointer text-[12px] border-l-4 transition-all duration-75 ${getJudgeClass(row.judge)}`;
                tr.onclick = () => openReview(row.id);
                const depts = [row.dept1, row.dept2, row.dept3].filter(Boolean).join(', ');
                tr.innerHTML = `
                    <td class="col-id font-mono text-slate-500 font-bold tracking-tighter">${row.id}</td>
                    <td class="col-judge"><span class="status-badge ${getBadgeColor(row.judge)}">${row.judge}</span></td>
                    <td class="col-error text-slate-600 font-bold">${row.errorType}</td>
                    <td class="col-dept text-slate-500 italic" title="${depts}">${depts || '-'}</td>
                    <td class="col-query text-slate-800 font-bold">${row.query}</td>
                    <td class="col-action text-center"><button class="bg-slate-100 hover:bg-indigo-600 hover:text-white px-2 py-1 rounded font-black transition-all">EDIT</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getJudgeClass(j) { return j==='◎正解' ? 'row-correct' : j==='〇一部正解' ? 'row-partial' : j==='✕不正解' ? 'row-incorrect' : 'row-unknown'; }
        function getBadgeColor(j) { return j==='◎正解' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : j==='〇一部正解' ? 'bg-amber-100 text-amber-700 border-amber-200' : j==='✕不正解' ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-slate-100 text-slate-500'; }

        function initCharts() {
            const judgeCounts = {}; window.fullData.forEach(d => judgeCounts[d.judge] = (judgeCounts[d.judge] || 0) + 1);
            const errorCounts = {}; window.fullData.filter(d => d.errorType && d.errorType !== 'なし').forEach(d => errorCounts[d.errorType] = (errorCounts[d.errorType] || 0) + 1);
            if (window.charts.judgment) window.charts.judgment.destroy();
            if (window.charts.error) window.charts.error.destroy();
            const ctx1 = document.getElementById('judgmentChart');
            if (ctx1 && window.fullData.length > 0) {
                window.charts.judgment = new Chart(ctx1, { type: 'doughnut', data: { labels: Object.keys(judgeCounts), datasets: [{ data: Object.values(judgeCounts), backgroundColor: ['#10b981', '#f59e0b', '#ef4444', '#94a3b8'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 6, font: { size: 10, weight: 'bold' } } } } } });
            }
            const ctx2 = document.getElementById('errorChart');
            if (ctx2 && Object.keys(errorCounts).length > 0) {
                window.charts.error = new Chart(ctx2, { type: 'bar', data: { labels: Object.keys(errorCounts), datasets: [{ label: 'Count', data: Object.values(errorCounts), backgroundColor: '#6366f1', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 9 } } }, y: { grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' } } } } } });
            }
        }

        // Shared Global Functions
        window.openNewRecordModal = () => {
            window.currentEditingId = null;
            document.getElementById('modalTitle').textContent = "新規案件登録";
            document.getElementById('modalCaseIdDisplay').textContent = "NEW CLOUD ENTRY";
            ['edit-id', 'edit-session', 'edit-userId', 'edit-query', 'edit-answer', 'edit-dept1', 'edit-dept2', 'edit-dept3', 'edit-ideal', 'edit-action'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('edit-id').value = `CASE-${Date.now().toString().slice(-6)}`;
            document.getElementById('edit-date').value = new Date().toLocaleString('ja-JP');
            document.getElementById('edit-judge').value = "△判別不能";
            document.getElementById('edit-errorType').value = "なし";
            document.getElementById('edit-status').value = "未着手";
            document.getElementById('reviewModal').classList.remove('hidden');
        };

        window.openReview = (id) => {
            const item = window.fullData.find(d => d.id === id); if(!item) return;
            window.currentEditingId = id;
            document.getElementById('modalTitle').textContent = "案件編集・査読";
            document.getElementById('modalCaseIdDisplay').textContent = item.id;
            ['id', 'session', 'date', 'userId', 'query', 'answer', 'dept1', 'dept2', 'dept3', 'judge', 'errorType', 'status', 'ideal', 'action'].forEach(key => {
                const el = document.getElementById(`edit-${key}`); if (el) el.value = item[key] || '';
            });
            document.getElementById('reviewModal').classList.remove('hidden');
        };

        window.closeModal = () => { document.getElementById('reviewModal').classList.add('hidden'); };

        window.saveChanges = async () => {
            const id = document.getElementById('edit-id').value.trim();
            if (!id) return alert("IDは必須です");
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = "SAVING...";

            const record = { id };
            ['date', 'session', 'userId', 'query', 'answer', 'judge', 'errorType', 'dept1', 'dept2', 'dept3', 'status', 'ideal', 'action'].forEach(k => {
                record[k] = document.getElementById(`edit-${k}`).value;
            });

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'answers', id), record);
                window.closeModal();
                showMessage("<i data-lucide='cloud-check'></i> クラウドへ保存しました");
                lucide.createIcons();
            } catch (err) { alert("保存失敗: " + err.message); }
            finally { btn.disabled = false; btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i>クラウドに保存`; lucide.createIcons(); }
        };

        window.clearCloudData = async () => {
            if (!confirm("クラウド上の全データを削除します。本当によろしいですか？")) return;
            showMessage("全件消去を実行中...");
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'answers'));
                const docs = snap.docs;
                for (let i = 0; i < docs.length; i += 500) {
                    const batch = writeBatch(db);
                    docs.slice(i, i + 500).forEach(d => batch.delete(d.ref));
                    await batch.commit();
                }
                showMessage("全データを消去しました");
            } catch (err) { showMessage("削除失敗", true); }
        };

        window.exportData = () => {
            if (window.fullData.length === 0) return alert("データがありません");
            const exp = window.fullData.map(d => ({
                "案件ID": d.id, "セッションID": d.session, "問い合わせ日時": d.date, "ユーザーID": d.userId, "問い合わせ内容": d.query, "回答内容": d.answer, "所管課": [d.dept1, d.dept2, d.dept3].filter(Boolean).join('\n'), "正誤判定": d.judge, "エラー分類": d.errorType, "理想の回答": d.ideal, "改善アクション": d.action, "対応状況": d.status
            }));
            const csv = Papa.unparse(exp);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
            link.download = `分析結果_${new Date().toISOString().split('T')[0]}.csv`; link.click();
        };

        window.toggleSort = (key) => {
            window.sortConfig.direction = (window.sortConfig.key === key && window.sortConfig.direction === 'asc') ? 'desc' : 'asc';
            window.sortConfig.key = key;
            applyFilters();
        };

        function updateDeptFilterList() {
            const depts = new Set();
            window.fullData.forEach(d => { [d.dept1, d.dept2, d.dept3].forEach(v => v && depts.add(v)); });
            const sel = document.getElementById('filterDept');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">すべての所管課</option>';
            Array.from(depts).sort().forEach(d => {
                const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o);
            });
            if (depts.has(cur)) sel.value = cur;
        }

        function updateLoadStatus(text, colorClass) {
            const el = document.getElementById('loadStatus');
            if (el) { el.textContent = text; el.className = `text-[9px] font-black uppercase tracking-widest ${colorClass}`; }
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterJudge').addEventListener('change', applyFilters);
        document.getElementById('filterDept').addEventListener('change', applyFilters);

        // Start
        initCloud();
    </script>
</body>
</html>
